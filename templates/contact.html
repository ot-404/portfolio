{% extends "base.html" %}

{% block title %}Contact — {{ profile.name }}{% endblock %}

{% block content %}
<section class="section container narrow">
  <p class="eyebrow">Say hello</p>
  <h1 class="page-title">Get in touch</h1>
  <p class="lead">
    Have a project in mind or just want to connect? Drop me a message
    or email <a href="mailto:{{ profile.email }}">{{ profile.email }}</a>.
  </p>

  <form class="contact-form" method="post" action="{{ url_for('contact') }}">
    <div class="field">
      <label for="name">Name</label>
      <input type="text" id="name" name="name" required autocomplete="name" />
    </div>
    <div class="field">
      <label for="email">Email</label>
      <input type="email" id="email" name="email" required autocomplete="email" />
    </div>
    <div class="field">
      <label for="message">Message</label>
      <textarea id="message" name="message" rows="6" required></textarea>
    </div>
    <button type="submit" class="btn btn-primary">Send message</button>
  </form>
</section>
{% endblock %}
