# Render Blueprint — https://render.com/docs/blueprint-spec
# Deploy: Render Dashboard → New → Blueprint → connect this repo → Apply.
services:
  - type: web
    name: portfolio
    runtime: python
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn app:app --bind 0.0.0.0:$PORT"
    envVars:
      # A strong random secret is generated for you and kept across deploys.
      - key: SECRET_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: "3.12.7"
      # --- Contact-form email (SMTP via Brevo) ---
      - key: SMTP_HOST
        value: "smtp-relay.brevo.com"
      - key: SMTP_PORT
        value: "587"
      # Secrets / addresses: Render prompts you to enter these on first deploy
      # (sync: false keeps them out of this committed file).
      - key: SMTP_USER       # Brevo login
        sync: false
      - key: SMTP_PASSWORD   # Brevo SMTP key
        sync: false
      - key: SMTP_FROM       # verified sender address (e.g. opshokare@gmail.com)
        sync: false
      - key: CONTACT_TO      # inbox to deliver to
        sync: false
